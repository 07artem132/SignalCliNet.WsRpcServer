name: CI

# Build + test gate для SignalCliNet.WsRpcServer.
# Особливість цього репо: три upstream-пакети (SignalCli.NET, JSON-RPC.NET, SignalCli.Runtime)
# живуть у ПРИВАТНОМУ GitHub Packages feed (NuGet.Config packageSourceMapping), тож restore
# вимагає автентифікації токеном із read:packages.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x

      # Автентифікуємо приватний GitHub Packages feed (джерело `github` уже є в NuGet.Config).
      - name: Authenticate GitHub Packages feed
        run: >
          dotnet nuget update source github
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --configfile NuGet.Config

      - name: Restore
        run: dotnet restore SignalCliNet.WsRpcServer.sln

      # Явний gate вразливостей: `dotnet list --vulnerable` завжди exit 0, тож грепаємо вивід.
      - name: NuGet vulnerability audit gate
        run: |
          set -euo pipefail
          dotnet list SignalCliNet.WsRpcServer.sln package --vulnerable --include-transitive 2>&1 | tee audit.txt
          if grep -q "has the following vulnerable packages" audit.txt; then
            echo "::error::Знайдено вразливі NuGet-пакети — див. лог вище."
            exit 1
          fi

      - name: Build (Release)
        run: dotnet build SignalCliNet.WsRpcServer.sln -c Release --no-restore

      - name: Test (Release)
        run: >
          dotnet test tests/SignalCliNet.WsRpcServer.Tests/SignalCliNet.WsRpcServer.Tests.csproj
          -c Release --no-build
